services:
  - type: web
    name: careera-api
    env: node
    plan: free
    rootDir: artifacts/api-server
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
